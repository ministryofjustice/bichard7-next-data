name: Update npm dependencies

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
  push:
    branches:
      - auto-npm-update

jobs:
  update_deps:
    name: Update dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6

      - name: Setup node version
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6
        with:
          node-version-file: .nvmrc

      - name: ⛓️ SLSA Supply Chain Security
        uses: ministryofjustice/devsecops-actions/sca/slsa@559ec2408860d9237cc472a5710e61c1c2187ffa # v1.4.0

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Update dependencies
        run: npm run update-deps

      - name: Report Status
        if: failure()
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d #v2.0.0
        with:
          webhook-type: incoming-webhook
          payload: |
            text: "GitHub action failed"  
            attachments:  
              - color: "#a30000" # Red  
                blocks:  
                  - type: "section"  
                    text:  
                      type: "mrkdwn"  
                      text: ":elmo-fire: *${{ github.workflow }}* failed in <${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}>"  
                  - type: "context"  
                    elements:  
                      - type: "mrkdwn"  
                        text: "Linked to Repo <${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}>"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.ACTION_MONITORING_SLACK }}

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@98357b18bf14b5342f975ff684046ec3b2a07725 # v8
        with:
          branch: auto/update-npm-deps
          delete-branch: true
          committer: GitHub <noreply@github.com>
          author: GitHub <noreply@github.com>
          commit-message: Update npm dependencies
          title: Update npm dependencies
          body: >
            Automated npm dependency updates generated by the
            [Update npm dependencies](https://github.com/ministryofjustice/bichard7-next-audit-logging/actions/workflows/update-npm-deps.yml)
            workflow.

      - name: Check PR information
        run: |
          echo "PR #${{ steps.cpr.outputs.pull-request-number}}"
          echo "${{ steps.cpr.outputs.pull-request-url }}"
